name: SonarQube
on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest
    env:
      BUILD_WRAPPER_OUT_DIR: build_wrapper_output_directory

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Build Wrapper
        uses: SonarSource/sonarqube-scan-action/install-build-wrapper@v5

      - name: Create build directory
        run: mkdir -p build

      - name: Run Build Wrapper (compile main.c)
        run: |
          build-wrapper-linux-x86-64 --out-dir $BUILD_WRAPPER_OUT_DIR gcc -c main.c -o build/main.o

      - name: Run SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}  # e.g., https://sonar.mycompany.com
        with:
          args: >
            --define sonar.cfamily.build-wrapper-output=$BUILD_WRAPPER_OUT_DIR
